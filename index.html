<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCE Sandbox</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --panel-bg: #1e1e1e;
            --text-main: #e2e8f0;
            --text-muted: #a6accd;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #2e344e;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        header { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        header h2 { margin: 0; font-weight: 500; }

        .container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        .left-panel { flex: 6; display: flex; flex-direction: column; }
        .right-panel { flex: 4; display: flex; flex-direction: column; gap: 15px; }

        .box {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .box-header {
            background: #23273b;
            padding: 10px 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        /* NEW: Toolbar CSS */
        .toolbar {
            background: #23273b;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .toolbar select, .toolbar input {
            background: #1a1c29;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
        }
        .toolbar label { font-size: 0.85rem; color: var(--text-muted); }

        textarea, pre {
            width: 100%;
            background: transparent;
            color: #c3e88d;
            border: none;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 15px;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        .left-panel .box { flex: 1; }
        textarea { flex: 1; }
        pre { margin: 0; flex: 1; overflow-y: auto; color: #82aaff; }

        #editorContainer { flex: 1; width: 100%; min-height: 0; }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover { background: var(--accent-hover); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <h2>RCE Execution Environment</h2>
    </header>

    <div class="container">
        <div class="left-panel">
            <div class="box">
                <div class="box-header">source.cpp</div>
                
                <div class="toolbar">
                    <div>
                        <label>Theme: </label>
                        <select id="themeSelect" onchange="changeTheme()">
                            <option value="vs-dark">Dark</option>
                            <option value="vs">Light</option>
                            <option value="hc-black">High Contrast</option>
                        </select>
                    </div>
                    <div>
                        <label>Font Size: </label>
                        <input type="number" id="fontSizeInput" value="15" min="10" max="30" style="width: 50px;" onchange="changeFontSize()">
                    </div>
                </div>

                <div id="editorContainer"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="box" style="flex: 0.3;">
                <div class="box-header">Standard Input</div>
                <textarea id="stdInput" spellcheck="false">5</textarea>
            </div>
            
            <button onclick="runCode()">Run Execution</button>
            
            <div class="box" style="flex: 0.7;">
                <div class="box-header">Console Output</div>
                <pre id="consoleOutput">Awaiting execution...</pre>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('editorContainer'), {
                value: "#include<iostream>\nusing namespace std;\nint main(){\n    int t; \n    cin >> t; \n    cout << t * 10;\n    return 0;\n}",
                language: 'cpp',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 15
            });
        });
    </script>
    
    <script src="script.js"></script>
</body>
</html>
